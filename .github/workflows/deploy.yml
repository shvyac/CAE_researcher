name: Deploy

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          # Strip Windows-style \r in case the secret was pasted with CRLF
          printf '%s' "${{ secrets.SAKURA_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          echo "" >> ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Fetch all host key types (rsa, ecdsa, ed25519)
          ssh-keyscan -t rsa,ecdsa,ed25519 -H "${{ secrets.SAKURA_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          chmod 600 ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes \
            "${{ secrets.SAKURA_USER }}@${{ secrets.SAKURA_HOST }}" \
            "echo '✓ SSH OK'"

      - name: Create remote directories
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            "${{ secrets.SAKURA_USER }}@${{ secrets.SAKURA_HOST }}" \
            "mkdir -p /var/www/mysite/user/themes/cae-theme/dist /var/www/mysite/user/data"

      - name: Deploy dist/ via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519" \
            dist/ \
            "${{ secrets.SAKURA_USER }}@${{ secrets.SAKURA_HOST }}:/var/www/mysite/user/themes/cae-theme/dist/"

      - name: Copy caeSystems.json
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/id_ed25519" \
            src/data/caeSystems.json \
            "${{ secrets.SAKURA_USER }}@${{ secrets.SAKURA_HOST }}:/var/www/mysite/user/data/cae_systems.json"
