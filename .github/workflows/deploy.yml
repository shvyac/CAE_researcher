name: Deploy

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          # Write key — echo preserves newlines in GitHub Actions secrets
          echo "${{ secrets.SAKURA_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Verify key header is intact
          head -1 ~/.ssh/id_ed25519
          # Fetch all host key types
          ssh-keyscan -t rsa,ecdsa,ed25519 -H "${{ secrets.SAKURA_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          echo "known_hosts lines: $(wc -l < ~/.ssh/known_hosts)"

      - name: Test SSH connection (verbose)
        run: |
          ssh -v -i ~/.ssh/id_ed25519 \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            "${{ secrets.SAKURA_USER }}@${{ secrets.SAKURA_HOST }}" \
            "echo SSH OK"

      - name: Create remote directories
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            "${{ secrets.SAKURA_USER }}@${{ secrets.SAKURA_HOST }}" \
            "mkdir -p /var/www/mysite/user/themes/cae-theme/dist /var/www/mysite/user/data"

      - name: Deploy dist/ via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519" \
            dist/ \
            "${{ secrets.SAKURA_USER }}@${{ secrets.SAKURA_HOST }}:/var/www/mysite/user/themes/cae-theme/dist/"

      - name: Copy caeSystems.json
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/id_ed25519" \
            src/data/caeSystems.json \
            "${{ secrets.SAKURA_USER }}@${{ secrets.SAKURA_HOST }}:/var/www/mysite/user/data/cae_systems.json"

      - name: Deploy fetch script
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/id_ed25519" \
            scripts/fetch_cae_news.py \
            "${{ secrets.SAKURA_USER }}@${{ secrets.SAKURA_HOST }}:/home/${{ secrets.SAKURA_USER }}/scripts/fetch_cae_news.py"

      - name: Sync source data to server repo
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/id_ed25519" \
            src/data/caeSystems.json \
            src/data/caeTargets.json \
            "${{ secrets.SAKURA_USER }}@${{ secrets.SAKURA_HOST }}:/home/${{ secrets.SAKURA_USER }}/CAE_researcher/src/data/"
